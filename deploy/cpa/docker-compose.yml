services:
  cliproxyapi:
    image: eceasy/cli-proxy-api:latest
    container_name: cliproxyapi
    restart: unless-stopped
    ports:
      - "8317:8317"
    volumes:
      # Compatible with different CLIProxyAPI image versions.
      - ./config.yaml:/app/config.yaml:ro
      - ./config.yaml:/CLIProxyAPI/config.yaml:ro
      - ./auth:/root/.cli-proxy-api
    labels:
      - com.centurylinklabs.watchtower.enable=true

  watchtower:
    image: containrrr/watchtower:latest
    container_name: cliproxyapi-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --label-enable --cleanup --interval 300 cliproxyapi
